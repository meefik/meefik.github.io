# ----------------------- #
#      Main Config        #
# ----------------------- #

url: "https://meefik.dev"
title: "Meefik's Blog"
subtitle: "Freedom and Open Source"
description: "Thoughts, tutorials and ideas about programming, technology and open source."
author: "Anton Skshidlevsky"
author_url: "/about"
email: "meefik [at] gmail.com"
avatar: "https://gravatar.com/avatar/460dcd88ac4a0088b561166e395aa29f?s=100"
profile: "https://gravatar.com/meefik"
locale: "en_US"
simple_search: "https://duckduckgo.com"
permalink: "/:year/:month/:day/:title/"
markdown: "kramdown"
highlighter: "rouge"
paginate: 10
paginate_path: "posts/:num"
excerpt_link: "Read on &rarr;"
excerpt_separator: "<!--more-->"
edit: true

sass:
  sass_dir: _sass
  style: compressed

plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
    values:
      image: "/assets/images/og-image.png"

# ----------------------- #
#   3rd Party Settings    #
# ----------------------- #

